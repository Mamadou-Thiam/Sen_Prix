services:
  - type: web
    name: senprix-api
    env: docker
    dockerfile: ./server/Dockerfile
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: 32
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://sen-prix-web.onrender.com

  - type: web
    name: senprix-web
    env: docker
    dockerfile: ./client/Dockerfile
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: nginx -g 'daemon off;'
    envVars:
      - key: REACT_APP_API_URL
        value: https://sen-prix.onrender.com/api