services:
  - type: web
    name: senprix-server
    env: docker
    dockerfile: server/Dockerfile
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: 32
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
    autorename: senprix-api

  - type: web
    name: senprix-client
    env: docker
    dockerfile: client/Dockerfile
    region: frankfurt
    buildCommand: npm ci && npm run build --env REACT_APP_API_URL=$API_URL
    startCommand: nginx -g 'daemon off;'
    envVars:
      - key: REACT_APP_API_URL
        value: https://senprix-server.onrender.com/api